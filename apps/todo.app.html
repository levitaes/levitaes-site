<!DOCTYPE html>
<html lang="en">
<head>
    <title>Flashcards</title>
    <link href="../extensions/bootstrap.css" rel="stylesheet">
    <meta charset="UTF-8">
    <style>
        a { color: black; }
        a:hover { color: black; }

        ::-webkit-scrollbar { display: none; }
        .content { scrollbar-width: 0; }

        ul li {
            cursor: pointer;
            position: relative;
            padding: 12px 8px 12px 40px;
            list-style-type: none;
            background: rgb(249, 245, 241);
            font-size: 18px;
            transition: 0.2s;
            user-select: none;
        }

        .close {
            position: absolute;
            right: 0;
            top: 0;
            padding: 8px 16px 12px 16px;
        }

        /* Study mode */
        #studyView {
            display: none;
            text-align: center;
            margin-top: 40px;
        }

        .card-box {
            background: rgb(249, 245, 241);
            padding: 40px;
            font-size: 24px;
            border: 2px solid black;
            cursor: pointer;
        }
    </style>
</head>

<body class="bg-light">
<div class="container" id="mainView">
    <div class="row mt-2">
        <div class="col-6 pe-1">
            <input id="frontInput"
                   class="bg-primary mt-2 rounded-0 rounded-start form-control"
                   type="text"
                   placeholder="front">
        </div>
        <div class="col-6 ps-1">
            <input id="backInput"
                   class="bg-primary mt-2 rounded-0 rounded-end form-control"
                   type="text"
                   placeholder="back">
        </div>
    </div>

    <div class="row mt-2">
        <div class="col">
            <button class="bg-primary rounded-0 rounded-top w-100 border-dark mt-2" onclick="startStudy()">Start Study Mode</button>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <ul id="unorderedList"
                class="list-group list-group-flush border border-dark border-2 rounded-0 rounded-bottom mt-1 p-0 bg-primary mb-3"
                style="min-height: 5px;">
            </ul>
        </div>
    </div>
</div>

<!-- Study View -->
<div class="container" id="studyView">
    <div class="card-box" id="studyCard" onclick="flipCard()"></div>

    <div class="mt-3">
        <button class="bg-primary me-2 rounded-0 rounded-start border-dark" onclick="nextCard()">Next</button>
        <button class="bg-primary me-2 rounded-0 rounded-end border-dark" onclick="exitStudy()">Exit</button>
    </div>
</div>

<script>
let frontInput = document.getElementById("frontInput");
let backInput = document.getElementById("backInput");

backInput.addEventListener("keypress", function(event) {
    if (event.key === "Enter") newElement();
});

if (localStorage.getItem("cards") === null) {
    localStorage.setItem("cards", JSON.stringify([]));
}

pullEntries();

function pullEntries() {
    let arr = JSON.parse(localStorage.getItem("cards"));
    document.getElementById("unorderedList").innerHTML = "";
    arr.forEach(card => newElementFromStorage(card));
}

function newElement() {
    let front = frontInput.value.trim();
    let back = backInput.value.trim();
    if (front === "" || back === "") return;

    let card = { front, back };

    let arr = JSON.parse(localStorage.getItem("cards"));
    arr.push(card);
    localStorage.setItem("cards", JSON.stringify(arr));

    frontInput.value = "";
    backInput.value = "";

    pullEntries();
}

function newElementFromStorage(card) {
    let li = document.createElement("li");
    li.classList.add("list-group-item","list-group-item-action","bg-secondary");

    li.textContent = card.front;
    li.dataset.front = card.front;
    li.dataset.back = card.back;
    li.dataset.side = "front";

    let span = document.createElement("SPAN");
    span.className = "close";
    span.appendChild(document.createTextNode("\u00D7"));

    span.onclick = function(e) {
        e.stopPropagation();
        let arr = JSON.parse(localStorage.getItem("cards"));
        arr = arr.filter(c => !(c.front === card.front && c.back === card.back));
        localStorage.setItem("cards", JSON.stringify(arr));
        pullEntries();
    };

    li.onclick = function () {
        if (li.dataset.side === "front") {
            li.textContent = li.dataset.back;
            li.dataset.side = "back";
        } else {
            li.textContent = li.dataset.front;
            li.dataset.side = "front";
        }
        li.appendChild(span);
    };

    li.appendChild(span);
    document.getElementById("unorderedList").appendChild(li);
}

/* ---- Study Mode ---- */
let currentCard = null;
let currentSide = "front";

function startStudy() {
    let arr = JSON.parse(localStorage.getItem("cards"));
    if (arr.length === 0) return;

    document.getElementById("mainView").style.display = "none";
    document.getElementById("studyView").style.display = "block";

    nextCard();
}

function nextCard() {
    let arr = JSON.parse(localStorage.getItem("cards"));
    currentCard = arr[Math.floor(Math.random() * arr.length)];
    currentSide = "front";
    document.getElementById("studyCard").textContent = currentCard.front;
}

function flipCard() {
    if (!currentCard) return;

    if (currentSide === "front") {
        document.getElementById("studyCard").textContent = currentCard.back;
        currentSide = "back";
    } else {
        document.getElementById("studyCard").textContent = currentCard.front;
        currentSide = "front";
    }
}

function exitStudy() {
    document.getElementById("studyView").style.display = "none";
    document.getElementById("mainView").style.display = "block";
}
</script>
</body>
</html>
